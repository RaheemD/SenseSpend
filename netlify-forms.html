<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netlify Forms - SpendSense</title>
</head>
<body>
  <!-- This file is for Netlify form detection only -->
  <!-- The actual form is in spendsense_ai.html -->
  
  <form name="support" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="support" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="subject" />
    <textarea name="message"></textarea>
    <input type="text" name="user-id" />
    <input type="text" name="timestamp" />
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
